    Sie möchten am Community Meeting teilnehmen? Melden Sie sich gerne bei der Geschäftsstelle des RDMO e.V. unter contact@rdmo.org"
    en: "The RDMO e.V. Executive Board and the Release Manager will report on current developments and news.
    In addition, the RDMO working groups and members of the community will present their projects.
    This will be followed (from around 12 noon) by the RDMO e.V. General Meeting – exclusively for association members.
    Would you like to attend the Community Meeting? Please feel free to contact the RDMO e.V. office at contact@rdmo.org"

