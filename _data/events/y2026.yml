    de: "15. RDMO-Community-Treffen"
    en: "15th RDMO Community Meeting"
  event:
    de: "Der Vorstand des RDMO e.V. und der Release Manager berichten über aktuelle Entwicklungen und Neuigkeiten. Zudem präsentieren die RDMO-Arbeitsgruppen und Mitglieder der Community ihre Projekte. Im Anschluss (ab ca. 12 Uhr) findet die Mitgliederversammlung des RDMO e.V. statt – exklusiv für Vereinsmitglieder. Sie möchten am Community Meeting teilnehmen? Melden Sie sich gerne bei der Geschäftsstelle des RDMO e.V. unter contact@rdmo.org"
    en: "The RDMO e.V. Executive Board and the Release Manager will report on current developments and news. In addition, the RDMO working groups and members of the community will present their projects. This will be followed (from around 12 noon) by the RDMO e.V. General Meeting – exclusively for association members. Would you like to attend the Community Meeting? Please feel free to contact the RDMO e.V. office at contact@rdmo.org"



